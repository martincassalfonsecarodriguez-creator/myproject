<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Ubicación</title>
    <style>
        .contenedor {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
        }
        .boton-ubicacion {
            background-color: #007bff;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .boton-ubicacion:hover {
            background-color: #0056b3;
        }
        .texto-consentimiento {
            font-family: Arial, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: #333333;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <!-- Botón de acción solicitado -->
    <button id="btnObtener" class="boton-ubicacion">¡Presiona aquí para obtener tu latitud y longitud!</button>
    
    <!-- Texto de aviso legal en Arial 24 Negrita -->
    <p class="texto-consentimiento">
        Al dar click en este botón acepta que proporciona la ubicación de su vivienda.
    </p>
</div>

<script>
    document.getElementById('btnObtener').addEventListener('click', () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const latitud = position.coords.latitude;
                    const longitud = position.coords.longitude;
                    
                    // Llama a la función que envía los datos en segundo plano
                    enviarAlServidor(latitud, longitud);
                },
                (error) => {
                    alert("Error al obtener la ubicación: " + error.message);
                }
            );
        } else {
            alert("La geolocalización no es compatible con este navegador.");
        }
    });

    function enviarAlServidor(lat, lng) {
        // Enlace configurado con tu dirección de correo electrónico a través de FormSubmit
        const urlBackend = "https://formsubmit.co"; 

        // Paquete de datos estructurado que llegará a tu bandeja de entrada
        const datos = {
            Mensaje: "El usuario ha otorgado consentimiento.",
            Latitud: lat,
            Longitud: lng,
            Enlace_Google_Maps: `https://google.com{lat},${lng}`
        };

        // Petición HTTP POST en segundo plano
        fetch(urlBackend, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify(datos)
        })
        .then(response => {
            if (response.ok) {
                alert("Ubicación procesada correctamente.");
            } else {
                alert("Hubo un problema al enviar la información.");
            }
        })
        .catch(error => {
            console.error("Error en la conexión:", error);
            alert("Error de red al procesar la solicitud.");
        });
    }
</script>

</body>
</html>
