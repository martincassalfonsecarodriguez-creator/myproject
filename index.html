<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Ubicación</title>
    <style>
        .contenedor {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
        }
        .boton-ubicacion {
            background-color: #007bff;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .boton-ubicacion:hover {
            background-color: #0056b3;
        }
        .texto-consentimiento {
            font-family: Arial, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: #333333;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <!-- Botón de acción solicitado -->
    <button id="btnObtener" class="boton-ubicacion">¡Presiona aquí para obtener tu latitud y longitud!</button>
    
    <!-- Texto de aviso legal en Arial 24 Negrita -->
    <p class="texto-consentimiento">
        Al dar click en este botón acepta que proporciona la ubicación de su vivienda.
    </p>
</div>

<script>
    document.getElementById('btnObtener').addEventListener('click', () => {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const latitud = position.coords.latitude;
                    const longitud = position.coords.longitude;
                    
                    // Ejecuta la función de transmisión con los datos capturados
                    enviarAlServidor(latitud, longitud);
                },
                (error) => {
                    alert("Error al obtener la ubicación: " + error.message);
                }
            );
        } else {
            alert("La geolocalización no es compatible con este navegador.");
        }
    });

    function enviarAlServidor(lat, lng) {
        // Enlace de procesamiento (se requiere cambiar por el correo o identificador válido)
        const urlBackend = "https://formsubmit.co"; 

        // Empaquetado de variables utilizando el estándar FormData
        const formData = new FormData();
        formData.append("Mensaje", "El usuario ha otorgado consentimiento.");
        formData.append("Latitud", lat);
        formData.append("Longitud", lng);
        formData.append("Enlace_Google_Maps", `https://google.com{lat},${lng}`);

        // Transmisión asíncrona hacia el servicio remoto
        fetch(urlBackend, {
            method: 'POST',
            body: formData
        })
        .then(response => {
            if (response.ok) {
                alert("Ubicación enviada. Revisa tu Gmail para activar el formulario.");
            } else {
                alert("El servidor rechazó la solicitud. Código: " + response.status);
            }
        })
        .catch(error => {
            console.error("Error de red:", error);
            alert("Error de conexión con el servidor.");
        });
    }
</script>

</body>
</html>
