<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Estación Meteorológica Local</title>
    <style>
        .contenedor {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 50px auto;
            text-align: center;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }
        .boton-ubicacion {
            background-color: #007bff;
            color: white;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .texto-consentimiento {
            font-family: Arial, sans-serif;
            font-size: 24px;
            font-weight: bold;
            color: #333333;
            margin-top: 20px;
        }
        .panel-clima {
            margin-top: 30px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 5px;
            text-align: left;
            display: none;
        }
        .dato-clima {
            font-size: 18px;
            margin: 10px 0;
            color: #555555;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <button id="btnObtener" class="boton-ubicacion">¡Presiona aquí para obtener tu latitud y longitud!</button>
    <p class="texto-consentimiento">Al dar click en este botón acepta que proporciona la ubicación de su vivienda.</p>

    <div id="panelClima" class="panel-clima">
        <h3>Condiciones Meteorológicas Actuales:</h3>
        <div class="dato-clima"><strong>Coordenadas:</strong> <span id="txtCoords">--</span></div>
        <div class="dato-clima"><strong>Temperatura:</strong> <span id="txtTemp">--</span> °C</div>
        <div class="dato-clima"><strong>Humedad:</strong> <span id="txtHumedad">--</span> %</div>
        <div class="dato-clima"><strong>Índice UV:</strong> <span id="txtUV">--</span></div>
    </div>
</div>

<script>
    document.getElementById('btnObtener').addEventListener('click', () => {
        document.getElementById('btnObtener').innerText = "Procesando...";
        
        // Coordenadas fijas de prueba
        const latitud = 40.4167;
        const longitud = -3.7037;
        
        document.getElementById('txtCoords').innerText = `${latitud}, ${longitud}`;
        
        procesarDatosServidor(latitud, longitud);
    });

    function procesarDatosServidor(lat, lng) {
        // 1. CARGA DEL CLIMA INMEDIATA (No depende de Render)
        fetch(`https://open-meteo.com{lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,uv_index&timezone=auto`)
        .then(resClima => {
            if (!resClima.ok) throw new Error("Fallo en API de clima");
            return resClima.json();
        })
        .then(dataClima => {
            // Pintamos los datos en el navegador del usuario
            document.getElementById('txtTemp').innerText = dataClima.current.temperature_2m;
            document.getElementById('txtHumedad').innerText = dataClima.current.relative_humidity_2m;
            document.getElementById('txtUV').innerText = dataClima.current.uv_index;

            // Mostramos el recuadro gris en la pantalla
            document.getElementById('panelClima').style.display = 'block';
            document.getElementById('btnObtener').innerText = "¡Completado!";
        })
        .catch(error => {
            alert("Error al pintar el clima: " + error.message);
        });

        // 2. ENVÍO AL BACKEND (Ocurre de forma aislada de fondo)
        const urlBackend = "https://servidor-clima.onrender.com"; 
        const datos = {
            latitud: lat,
            longitud: lng,
            timestamp: new Date().toISOString()
        };

        fetch(urlBackend, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
        .then(() => console.log("Datos enviados a Render de fondo."))
        .catch(err => console.log("Render está despertando..."));
    }
</script>

</body>
</html>
